<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YMC | Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --sidebar-width: 220px; --bg-admin: #f9f9f9; --accent: #d4af37; --text-main: #1a1a1a; }
        body { background: var(--bg-admin); display: flex; min-height: 100vh; font-family: 'Inter', sans-serif; color: var(--text-main); margin: 0; }
        .sidebar { width: var(--sidebar-width); background: white; border-right: 1px solid rgba(0,0,0,0.05); padding: 40px 15px; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; box-sizing: border-box; }
        .sidebar-logo { margin-bottom: 50px; padding: 0 10px; text-align: center; }
        .sidebar-logo img { width: 100%; max-width: 120px; height: auto; }
        .nav-group { display: flex; flex-direction: column; gap: 8px; flex: 1; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 15px; color: #666; cursor: pointer; border-radius: 12px; font-size: 0.9rem; font-weight: 500; }
        .nav-item.active { background: rgba(212, 175, 55, 0.1); color: var(--accent); }
        .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 40px 60px; max-width: 1400px; }
        header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; }
        .admin-card { background: white; padding: 32px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.04); margin-bottom: 30px; }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-outline { background: transparent; border: 1.5px solid #eee; color: #555; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-size: 0.85rem; }
        .sub-nav { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .sub-btn { border: none; background: none; padding: 8px 16px; cursor: pointer; font-weight: 500; color: #888; border-radius: 8px; }
        .sub-btn.active { background: #f0f0f0; color: var(--text-main); }
        .cms-table-container { width: 100%; overflow-x: auto; margin-top: 10px; border-radius: 12px; border: 1px solid #eee; }
        .cms-table { width: 100%; border-collapse: collapse; min-width: 600px; }
        .cms-table th { text-align: left; padding: 12px; background: #fcfcfc; color: #aaa; font-weight: 500; border-bottom: 1px solid #eee; }
        .cms-table td { padding: 12px; border-bottom: 1px solid #f5f5f5; font-size: 0.85rem; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 8px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; font-family: inherit; }
        .arabic-input { font-family: 'Amiri', serif; font-size: 1.2rem; direction: rtl; }
        .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .mini-card { background: #fcfcfc; border: 1px solid #eee; border-radius: 18px; overflow: hidden; display: flex; flex-direction: column; }
        .mini-card-content { padding: 20px; flex: 1; }
        .mini-card img { width: 100%; height: 160px; object-fit: cover; border-bottom: 1px solid #eee; }
        .tab-content { display: none; }
        .active-tab { display: block; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 95%; max-width: 1200px; max-height: 90vh; border-radius: 24px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        .modal-header { padding: 24px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 24px; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 20px 24px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 12px; }
        .edit-input { width: 100%; border: 1px solid transparent; background: #f9f9f9; padding: 8px; border-radius: 6px; font-size: 0.85rem; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        #recurrence-details-box { background: #fff9e6; padding: 15px; border-radius: 12px; border: 1px solid #f0e0b0; margin-bottom: 20px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-logo"><img src="assets/logo.png" alt="YMC"></div>
        <nav class="nav-group">
            <div class="nav-item active" id="nav-timetable" onclick="showTab('timetable', this)"><i data-lucide="calendar"></i> Timetable</div>
            <div class="nav-item" id="nav-events" onclick="showTab('events', this)"><i data-lucide="newspaper"></i> Events & News</div>
            <div class="nav-item" id="nav-charity" onclick="showTab('charity', this)"><i data-lucide="heart"></i> Sadaqah</div>
            <div class="nav-item" id="nav-quotes" onclick="showTab('quotes', this)"><i data-lucide="quote"></i> Quran Quotes</div>
            <div class="nav-item nav-logout" onclick="logout()" style="margin-top:auto;"><i data-lucide="log-out"></i> Logout</div>
        </nav>
    </aside>

    <main class="main-content">
        <header>
            <div><h1 id="page-title">Manage Timetable</h1><p id="page-desc">Admin control panel</p></div>
        </header>

        <section id="tab-timetable" class="tab-content active-tab">
            <div class="admin-card">
                <h3>Upload New Month</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px; align-items: end;">
                    <div class="form-group" style="margin:0"><label>Month Name</label><input type="text" id="monthName" placeholder="e.g. April"></div>
                    <div class="form-group" style="margin:0"><label>Year</label><input type="number" id="monthYear" value="2026"></div>
                    <input type="file" id="csvFileInput" accept=".csv" hidden onchange="handleCSVSelect(this)">
                    <button class="btn-outline" onclick="document.getElementById('csvFileInput').click()">Choose CSV</button>
                </div>
                <div id="timetable-preview" class="cms-table-container" style="margin-top:20px;"></div>
                <button class="btn-primary" style="margin-top:20px;" id="saveTimetableBtn" onclick="syncTimetable()" disabled>Upload to Cloud</button>
            </div>
            <div class="admin-card">
                <h3>Active Months</h3>
                <div id="active-months-container"></div>
            </div>
        </section>

        <section id="tab-events" class="tab-content">
            <div class="admin-card">
                <div class="sub-nav">
                    <button class="sub-btn active" id="btn-sub-upcoming" onclick="setSubMode('upcoming')">Upcoming Events</button>
                    <button class="sub-btn" id="btn-sub-news" onclick="setSubMode('news')">Latest News</button>
                </div>
                <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <h3 id="event-list-title">Active Items</h3>
                    <button class="btn-primary" onclick="toggleForm('event')">+ Add New</button>
                </div>
                
                <div id="event-form" style="display:none; margin-bottom:30px; border:1px solid #eee; padding:25px; border-radius:15px; background:#fcfcfc;">
                    <div class="form-group"><label>Title</label><input type="text" id="eventTitle"></div>
                    <div class="form-group"><label>Description</label><textarea id="eventDesc" rows="4"></textarea></div>
                    
                    <div id="event-recurrence-toggle" class="checkbox-group">
                        <input type="checkbox" id="isRecurring" onchange="toggleRecurrenceFields()">
                        <label for="isRecurring" style="margin:0">Recurring Event (repeats regularly)</label>
                    </div>

                    <div id="event-date-time-fields" style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                        <div class="form-group"><label>Event Date</label><input type="date" id="eventDate"></div>
                        <div class="form-group"><label>Event Time</label><input type="text" id="eventTime" placeholder="e.g. 7:00 PM"></div>
                    </div>

                    <div id="event-recurring-field" style="display:none;">
                        <div id="recurrence-details-box">
                            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                                <div class="form-group">
                                    <label>Frequency</label>
                                    <select id="recurrenceType">
                                        <option value="Daily">Daily</option>
                                        <option value="Weekly" selected>Weekly</option>
                                        <option value="Monthly">Monthly</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Day / Details</label>
                                    <input type="text" id="recurrenceDay" placeholder="e.g. Every Friday">
                                </div>
                            </div>
                            <div class="form-group" style="margin-bottom:0">
                                <label>Time</label>
                                <input type="text" id="recurrenceTime" placeholder="e.g. 1:00 PM">
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Images</label>
                        <input type="file" id="eventImages" multiple accept="image/*">
                    </div>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <button class="btn-primary" id="saveEventBtn" onclick="uploadEvent()">Save Item</button>
                        <button class="btn-outline" onclick="toggleForm('event')">Cancel</button>
                    </div>
                </div>

                <div class="data-grid" id="events-grid"></div>
            </div>
        </section>

        <section id="tab-charity" class="tab-content">
            <div class="admin-card">
                <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <h3>Sadaqah Projects</h3>
                    <button class="btn-primary" onclick="toggleForm('charity')">+ Add Project</button>
                </div>
                <div id="charity-form" style="display:none; margin-bottom:30px; border:1px solid #eee; padding:25px; border-radius:15px; background:#fcfcfc;">
                    <div class="form-group"><label>Project Name</label><input type="text" id="charName"></div>
                    <div class="form-group"><label>Description</label><textarea id="charDesc" rows="3"></textarea></div>
                    <div class="form-group"><label>Target Amount (£)</label><input type="number" id="charTarget"></div>
                    <div class="form-group">
                        <label>Project Images</label>
                        <input type="file" id="charImages" multiple accept="image/*">
                    </div>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-primary" id="saveCharityBtn" onclick="uploadCharity()">Save Project</button>
                        <button class="btn-outline" onclick="toggleForm('charity')">Cancel</button>
                    </div>
                </div>
                <div class="data-grid" id="charity-grid"></div>
            </div>
        </section>

        <section id="tab-quotes" class="tab-content">
            <div class="admin-card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h3>Active Quotes</h3>
                    <button class="btn-primary" onclick="toggleForm('quote')">+ Add Single Quote</button>
                </div>
                <div id="quote-form" style="display:none; margin-bottom:30px; border-bottom:1px solid #eee; padding-bottom:20px;">
                    <div class="form-group"><label>Arabic</label><input type="text" id="qArabic" class="arabic-input"></div>
                    <div class="form-group"><label>English</label><textarea id="qEnglish"></textarea></div>
                    <div class="form-group"><label>Reference</label><input type="text" id="qRef"></div>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-primary" onclick="uploadQuote()">Save Quote</button>
                        <button class="btn-outline" onclick="toggleForm('quote')">Cancel</button>
                    </div>
                </div>
                <div class="cms-table-container">
                    <table class="cms-table">
                        <thead><tr><th>Arabic</th><th>English</th><th>Ref</th><th>Action</th></tr></thead>
                        <tbody id="quote-table-body"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <div id="editorModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Edit Timetable</h3>
                <button class="btn-outline" onclick="closeEditor()">✕</button>
            </div>
            <div class="modal-body"><div id="modal-table-container" class="cms-table-container"></div></div>
            <div class="modal-footer">
                <button class="btn-outline" onclick="closeEditor()">Cancel</button>
                <button class="btn-primary" onclick="saveEdits()">Save & Sync</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, setDoc, getDoc, query, orderBy, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCuMwrIJ2ZRXLUIkzAsu_LMPzGFGzR4Fuw",
            authDomain: "yardley-muslim-centre.firebaseapp.com",
            projectId: "yardley-muslim-centre",
            storageBucket: "yardley-muslim-centre.firebasestorage.app",
            messagingSenderId: "719443343087",
            appId: "1:719443343087:web:5bdf57271c1b4fcad10d1a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let pendingCSVData = "";
        let currentSubMode = 'upcoming';
        let globalMonths = [];
        let editingIndex = null;

        // --- COMMON UTILITIES ---

        const uploadFiles = async (files, folder) => {
            const urls = [];
            for (const file of files) {
                const fileName = `${Date.now()}_${file.name}`;
                const storageRef = ref(storage, `${folder}/${fileName}`);
                const snapshot = await uploadBytes(storageRef, file);
                const downloadURL = await getDownloadURL(snapshot.ref);
                urls.push(downloadURL);
            }
            return urls;
        };

        window.deleteDocItem = async (col, id) => {
            if(!confirm("Are you sure? This will also remove any images from storage.")) return;
            
            try {
                const docRef = doc(db, col, id);
                const snap = await getDoc(docRef);
                
                if (snap.exists()) {
                    const data = snap.data();
                    // Delete associated images from storage if they exist
                    if (data.images && Array.isArray(data.images)) {
                        const deletePromises = data.images.map(url => {
                            const imageRef = ref(storage, url);
                            return deleteObject(imageRef).catch(e => console.warn("Image delete failed (may not exist):", e));
                        });
                        await Promise.all(deletePromises);
                    }
                }

                await deleteDoc(docRef);
                
                if(col === 'upcoming' || col === 'news') fetchEvents();
                if(col === 'charity') fetchCharity();
                if(col === 'quotes') fetchQuotes();
            } catch (err) {
                alert("Deletion error: " + err.message);
            }
        };

        window.toggleForm = (type) => {
            const form = document.getElementById(type + '-form');
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        };

        window.showTab = (tabId, el) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.getElementById('tab-'+tabId).classList.add('active-tab');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('page-title').innerText = "Manage " + tabId.charAt(0).toUpperCase() + tabId.slice(1);
            if(tabId === 'timetable') fetchActiveMonths();
            if(tabId === 'events') fetchEvents();
            if(tabId === 'charity') fetchCharity();
            if(tabId === 'quotes') fetchQuotes();
        };

        // --- TIMETABLE LOGIC ---

        async function fetchActiveMonths() {
            const container = document.getElementById('active-months-container');
            const snap = await getDoc(doc(db, "settings", "timetable"));
            if (snap.exists() && snap.data().months) {
                globalMonths = snap.data().months;
                container.innerHTML = globalMonths.map((m, i) => `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:18px; background:#fff; border:1px solid #eee; border-radius:15px; margin-bottom:12px; cursor:pointer;" onclick="openEditor(${i})">
                        <div><strong>${m.name} ${m.year}</strong><br><span style="font-size:0.75rem; color:var(--accent)">Click to edit timetable</span></div>
                        <button class="btn-outline" style="color:red" onclick="event.stopPropagation(); deleteMonth(${i})">Delete</button>
                    </div>
                `).join('') || '<p>No months uploaded yet.</p>';
            }
        }

        window.openEditor = (index) => {
            editingIndex = index;
            const monthData = globalMonths[index];
            document.getElementById('modalTitle').innerText = `Editing ${monthData.name} ${monthData.year}`;
            const rows = monthData.csv.split('\n').filter(row => row.trim() !== '');
            let tableHtml = '<table class="cms-table" id="editTable"><thead><tr>';
            const headers = rows[0].split(',');
            headers.forEach(h => tableHtml += `<th>${h.replace(/"/g, '')}</th>`);
            tableHtml += '</tr></thead><tbody>';
            for(let i=1; i<rows.length; i++){
                const cols = rows[i].split(',');
                tableHtml += '<tr>';
                cols.forEach(col => {
                    tableHtml += `<td><input type="text" class="edit-input" value="${col.replace(/"/g, '')}"></td>`;
                });
                tableHtml += '</tr>';
            }
            tableHtml += '</tbody></table>';
            document.getElementById('modal-table-container').innerHTML = tableHtml;
            document.getElementById('editorModal').style.display = 'flex';
        };

        window.closeEditor = () => { document.getElementById('editorModal').style.display = 'none'; editingIndex = null; };

        window.saveEdits = async () => {
            const table = document.getElementById('editTable');
            const rows = Array.from(table.rows);
            const newCsv = rows.map(row => {
                const cells = Array.from(row.querySelectorAll('th, td'));
                return cells.map(cell => {
                    const input = cell.querySelector('input');
                    let val = input ? input.value : cell.innerText;
                    return `"${val.replace(/"/g, '""')}"`;
                }).join(',');
            }).join('\n');
            globalMonths[editingIndex].csv = newCsv;
            try {
                await updateDoc(doc(db, "settings", "timetable"), { months: globalMonths });
                alert("Saved!"); closeEditor(); fetchActiveMonths();
            } catch (e) { alert(e.message); }
        };

        window.handleCSVSelect = (input) => {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                pendingCSVData = e.target.result;
                document.getElementById('timetable-preview').innerHTML = `<p style="padding:10px; color:green;">CSV Ready</p>`;
                document.getElementById('saveTimetableBtn').disabled = false;
            };
            reader.readAsText(file);
        };

        window.syncTimetable = async () => {
            const m = document.getElementById('monthName').value.toUpperCase();
            const y = document.getElementById('monthYear').value;
            const newObj = { name: m, year: y, csv: pendingCSVData, addedAt: new Date() };
            await updateDoc(doc(db, "settings", "timetable"), { months: arrayUnion(newObj) });
            fetchActiveMonths();
        };

        window.deleteMonth = async (index) => {
            if(!confirm("Delete?")) return;
            globalMonths.splice(index, 1);
            await updateDoc(doc(db, "settings", "timetable"), { months: globalMonths });
            fetchActiveMonths();
        };

        // --- EVENTS LOGIC ---

        window.setSubMode = (mode) => {
            currentSubMode = mode;
            document.querySelectorAll('#tab-events .sub-btn').forEach(b => b.classList.toggle('active', b.id.includes(mode)));
            document.getElementById('event-list-title').innerText = mode === 'upcoming' ? 'Active Events' : 'Latest News';
            
            const dateTimeFields = document.getElementById('event-date-time-fields');
            const recurringToggle = document.getElementById('event-recurrence-toggle');
            const recurringField = document.getElementById('event-recurring-field');

            if (mode === 'news') {
                dateTimeFields.style.display = 'none';
                recurringToggle.style.display = 'none';
                recurringField.style.display = 'none';
            } else {
                dateTimeFields.style.display = 'grid';
                recurringToggle.style.display = 'flex';
                toggleRecurrenceFields(); 
            }
            fetchEvents();
        };

        window.toggleRecurrenceFields = () => {
            const isRecurring = document.getElementById('isRecurring').checked;
            const dateInput = document.getElementById('eventDate');
            const timeInput = document.getElementById('eventTime');
            const recurringField = document.getElementById('event-recurring-field');

            if (isRecurring) {
                dateInput.disabled = true;
                timeInput.disabled = true;
                recurringField.style.display = 'block';
            } else {
                dateInput.disabled = false;
                timeInput.disabled = false;
                recurringField.style.display = 'none';
            }
        };

        async function fetchEvents() {
            const grid = document.getElementById('events-grid');
            const col = currentSubMode === 'upcoming' ? 'upcoming' : 'news';
            const snap = await getDocs(query(collection(db, col), orderBy("createdAt", "desc")));
            grid.innerHTML = snap.docs.map(d => {
                const data = d.data();
                let subtitle = '';
                if (data.isRecurring) {
                    subtitle = `<p style="font-size:0.8rem; color:var(--accent); font-weight:600; margin:5px 0;">${data.recurrenceType}: ${data.recurrenceDay}</p>`;
                } else if (data.date) {
                    subtitle = `<p style="font-size:0.8rem; color:#888; margin:5px 0;">${data.date} at ${data.time}</p>`;
                }
                const imgHtml = (data.images && data.images.length > 0) 
                    ? `<img src="${data.images[0]}" alt="preview">` 
                    : `<div style="height:160px; background:#f0f0f0; display:flex; align-items:center; justify-content:center; color:#ccc"><i data-lucide="image"></i></div>`;
                return `
                <div class="mini-card">
                    ${imgHtml}
                    <div class="mini-card-content">
                        <h4 style="margin:0 0 10px 0">${data.title}</h4>
                        ${subtitle}
                        <button class="btn-outline" style="color:red; width:100%; margin-top:10px" onclick="deleteDocItem('${col}', '${d.id}')">Delete</button>
                    </div>
                </div>
            `}).join('') || '<p>No items found.</p>';
            lucide.createIcons();
        }

        window.uploadEvent = async () => {
            const title = document.getElementById('eventTitle').value;
            const description = document.getElementById('eventDesc').value;
            const isRecurring = document.getElementById('isRecurring').checked;
            const date = document.getElementById('eventDate').value;
            const time = document.getElementById('eventTime').value;
            const recurrenceType = document.getElementById('recurrenceType').value;
            const recurrenceDay = document.getElementById('recurrenceDay').value;
            const recurrenceTime = document.getElementById('recurrenceTime').value;
            const fileInput = document.getElementById('eventImages');
            const saveBtn = document.getElementById('saveEventBtn');

            if(!title) return alert("Title is required");
            
            try {
                saveBtn.disabled = true;
                saveBtn.innerText = "Uploading Images...";
                const col = currentSubMode === 'upcoming' ? 'upcoming' : 'news';
                let images = [];
                if(fileInput.files.length > 0) {
                    images = await uploadFiles(fileInput.files, col);
                }
                const payload = { title, desc: description, images, createdAt: new Date() };

                if(currentSubMode === 'upcoming') { 
                    payload.isRecurring = isRecurring;
                    if (isRecurring) {
                        payload.recurrenceType = recurrenceType;
                        payload.recurrenceDay = recurrenceDay;
                        payload.time = recurrenceTime;
                    } else {
                        payload.date = date; 
                        payload.time = time; 
                    }
                }

                await addDoc(collection(db, col), payload);
                toggleForm('event'); fetchEvents();
                // Reset fields
                document.getElementById('eventTitle').value = ""; document.getElementById('eventDesc').value = "";
                document.getElementById('eventDate').value = ""; document.getElementById('eventTime').value = "";
                document.getElementById('isRecurring').checked = false; document.getElementById('eventImages').value = "";
                toggleRecurrenceFields();
            } catch (err) {
                alert("Upload failed: " + err.message);
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = "Save Item";
            }
        };

        // --- CHARITY LOGIC ---

        async function fetchCharity() {
            const grid = document.getElementById('charity-grid');
            const snap = await getDocs(collection(db, "charity"));
            grid.innerHTML = snap.docs.map(d => {
                const data = d.data();
                const imgHtml = (data.images && data.images.length > 0) 
                    ? `<img src="${data.images[0]}" alt="preview">` 
                    : `<div style="height:160px; background:#f0f0f0; display:flex; align-items:center; justify-content:center; color:#ccc"><i data-lucide="image"></i></div>`;
                return `
                <div class="mini-card">
                    ${imgHtml}
                    <div class="mini-card-content">
                        <h4 style="margin:0 0 10px 0">${data.title}</h4>
                        <p>Target: £${data.target}</p>
                        <button class="btn-outline" style="color:red; width:100%" onclick="deleteDocItem('charity', '${d.id}')">Delete</button>
                    </div>
                </div>
            `}).join('');
            lucide.createIcons();
        }

        window.uploadCharity = async () => {
            const title = document.getElementById('charName').value;
            const description = document.getElementById('charDesc').value;
            const target = document.getElementById('charTarget').value;
            const fileInput = document.getElementById('charImages');
            const saveBtn = document.getElementById('saveCharityBtn');

            if(!title) return;
            
            try {
                saveBtn.disabled = true;
                saveBtn.innerText = "Uploading...";
                let images = [];
                if(fileInput.files.length > 0) {
                    images = await uploadFiles(fileInput.files, 'charity');
                }
                await addDoc(collection(db, "charity"), { title, description, target, images, createdAt: new Date() });
                toggleForm('charity'); fetchCharity();
                document.getElementById('charName').value = ""; document.getElementById('charDesc').value = "";
                document.getElementById('charTarget').value = ""; document.getElementById('charImages').value = "";
            } catch (err) {
                alert("Upload failed: " + err.message);
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = "Save Project";
            }
        };

        // --- QUOTES LOGIC ---

        async function fetchQuotes() {
            const tbody = document.getElementById('quote-table-body');
            const snap = await getDocs(query(collection(db, "quotes"), orderBy("createdAt", "desc")));
            tbody.innerHTML = snap.docs.map(d => {
                const q = d.data();
                return `<tr><td class="arabic-input">${q.arabic}</td><td>${q.english}</td><td>${q.reference}</td>
                <td><button class="btn-outline" style="color:red" onclick="deleteDocItem('quotes', '${d.id}')">Delete</button></td></tr>`;
            }).join('');
        }

        window.uploadQuote = async () => {
            const arabic = document.getElementById('qArabic').value;
            const english = document.getElementById('qEnglish').value;
            const reference = document.getElementById('qRef').value;
            if(!arabic || !english) return alert("Arabic and English text required");
            
            await addDoc(collection(db, "quotes"), { arabic, english, reference, createdAt: new Date() });
            
            // Clear inputs
            document.getElementById('qArabic').value = "";
            document.getElementById('qEnglish').value = "";
            document.getElementById('qRef').value = "";
            
            toggleForm('quote'); fetchQuotes();
        };

        // --- AUTH & INIT ---

        window.logout = () => { sessionStorage.clear(); location.href="login.html"; };

        window.addEventListener('DOMContentLoaded', () => {
            fetchActiveMonths();
            lucide.createIcons();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | YMC</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #f9f9f9;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.02);
        }
        .login-card img { width: 100px; margin-bottom: 25px; }
        .login-card h2 { margin-bottom: 10px; font-weight: 700; color: #1a1a1a; }
        .login-card p { color: #888; font-size: 0.9rem; margin-bottom: 35px; }
        
        input {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 15px;
            border: 1.5px solid #eee;
            border-radius: 14px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #d4af37; }

        .btn-login {
            width: 100%;
            background: #d4af37;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
        #error-msg { color: #ff4444; font-size: 0.85rem; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="assets/logo.png" alt="YMC Logo">
    <h2>Centre Admin</h2>
    <p>Enter the portal password</p>
    
    <input type="password" id="adminPass" placeholder="Password" onkeypress="if(event.key === 'Enter') handleLogin()">
    <button class="btn-login" onclick="handleLogin()">Access Dashboard</button>
    <p id="error-msg">Incorrect password. Please try again.</p>
</div>

<script>
    function handleLogin() {
        const pass = document.getElementById('adminPass').value;
        const correctPass = "YMC2026"; // Set your desired password here

        if(pass === correctPass) {
            // Store a simple "session" flag in the browser's memory
            sessionStorage.setItem('ymc_admin_auth', 'true');
            window.location.href = "admin.html";
        } else {
            document.getElementById('error-msg').style.display = "block";
        }
    }
</script>

</body>
</html>

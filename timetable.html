<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable | Yardley Muslim Centre</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <style>
        body { margin: 0; background-color: #f9f9f9; min-height: 100vh; display: flex; flex-direction: column; font-family: 'Inter', sans-serif; }
        .page-hero { position: absolute; top: 0; left: 0; width: 100%; height: 500px; z-index: -1; background: linear-gradient(to bottom, rgba(255, 255, 255, 0) 0%, #f9f9f9 100%), url('assets/timetable-hero.png'); background-size: cover; background-position: center; }
        .timetable-main-content { padding-top: 140px; max-width: 1200px; margin: 0 auto; padding-left: 20px; padding-right: 20px; position: relative; flex: 1; width: 100%; box-sizing: border-box; }

        /* Month Selector Styles */
        .month-selector-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .month-btns { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-month { padding: 10px 20px; border: 1px solid #ddd; border-radius: 12px; background: white; cursor: pointer; font-weight: 600; font-size: 0.85rem; color: #666; transition: 0.3s; }
        .btn-month.active { background: #d4af37; color: white; border-color: #d4af37; box-shadow: 0 4px 12px rgba(212, 175, 55, 0.2); }
        .month-dropdown { padding: 10px; border-radius: 12px; border: 1px solid #ddd; font-family: inherit; font-size: 0.85rem; cursor: pointer; background: white; }

        .table-wrapper { overflow-x: auto; background: white; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05); margin-bottom: 60px; width: 100%; }
        .timetable-data { width: 100%; border-collapse: collapse; text-align: center; }
        .timetable-data th { background: #fcfcfc; padding: 20px 10px; font-weight: 700; color: #888; border-bottom: 2px solid #f0f0f0; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.05em; }
        .timetable-data td { padding: 16px 10px; border-bottom: 1px solid #f8f8f8; color: #333; font-size: 0.9rem; }
        
        .row-highlight { background-color: rgba(212, 175, 55, 0.15) !important; outline: 2px solid #d4af37; position: relative; }
        .row-highlight td { color: #000 !important; font-weight: 700; }

        @media (max-width: 768px) { .page-hero { height: 350px; } .timetable-main-content { padding-top: 100px; } }
        .reveal { opacity: 0; transform: translateY(20px); transition: 0.6s all ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <div class="page-hero"></div>

    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html"><img src="assets/logo.png" alt="YMC Logo" class="logo-img"></a>

            <button class="menu-toggle" id="menu-toggle" aria-label="Toggle Menu">
                <i data-lucide="menu"></i>
            </button>

            <ul class="nav-menu" id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="timetable.html" style="color: #d4af37;">Timetable</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="donate.html" class="btn-donate">Du'a</a></li>
            </ul>
        </div>
    </nav>

    <main class="timetable-main-content">
        <div class="month-selector-area reveal" id="controls">
            <div class="month-btns" id="month-btn-container"></div>
            <select class="month-dropdown" id="month-dropdown-select"></select>
        </div>

        <div class="table-wrapper reveal" id="timetable-reveal-box">
            <table class="timetable-data">
                <thead><tr id="table-head"></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCuMwrIJ2ZRXLUIkzAsu_LMPzGFGzR4Fuw",
            authDomain: "yardley-muslim-centre.firebaseapp.com",
            projectId: "yardley-muslim-centre",
            storageBucket: "yardley-muslim-centre.firebasestorage.app",
            messagingSenderId: "719443343087",
            appId: "1:719443343087:web:5bdf57271c1b4fcad10d1a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allMonths = [];
        const parseRow = (row) => (row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || row.split(',')).map(c => c.replace(/^"|"$/g, '').trim());

        async function loadData() {
            try {
                const snap = await getDoc(doc(db, "settings", "timetable"));
                if (!snap.exists() || !snap.data().months) {
                    document.getElementById('table-body').innerHTML = '<tr><td>No data.</td></tr>';
                    return;
                }
                allMonths = snap.data().months;
                
                renderSelectors();

                // Logic: Find current month
                const currentMonthName = new Date().toLocaleString('en-GB', { month: 'long' }).toUpperCase();
                const foundIndex = allMonths.findIndex(m => m.name === currentMonthName);
                switchMonth(foundIndex !== -1 ? foundIndex : 0);

                document.querySelectorAll('.reveal').forEach(r => r.classList.add('active'));
            } catch (e) { console.error(e); }
        }

        function renderSelectors() {
            const btnBox = document.getElementById('month-btn-container');
            const selectBox = document.getElementById('month-dropdown-select');
            
            allMonths.forEach((m, i) => {
                const btn = document.createElement('button');
                btn.className = 'btn-month';
                btn.innerText = m.name;
                btn.onclick = () => switchMonth(i);
                btnBox.appendChild(btn);

                const opt = document.createElement('option');
                opt.value = i;
                opt.innerText = `${m.name} ${m.year}`;
                selectBox.appendChild(opt);
            });

            selectBox.onchange = (e) => switchMonth(e.target.value);
        }

        function switchMonth(index) {
            const monthData = allMonths[index];
            const lines = monthData.csv.split(/\r?\n/).filter(l => l.trim() !== '');
            const headers = parseRow(lines[0]);
            const rows = lines.slice(1).map(l => parseRow(l));

            document.getElementById('table-head').innerHTML = headers.map(h => `<th>${h}</th>`).join('');

            const now = new Date();
            const todayKey = `${String(now.getDate()).padStart(2, '0')}-${now.toLocaleString('en-GB', { month: 'short' }).toUpperCase()}`;

            let html = '';
            rows.forEach(row => {
                const isToday = row.some(cell => cell.toUpperCase().includes(todayKey));
                html += `<tr ${isToday ? 'class="row-highlight"' : ''}>${row.map(c => `<td>${c}</td>`).join('')}</tr>`;
            });

            document.getElementById('table-body').innerHTML = html;

            // UI Updates
            document.querySelectorAll('.btn-month').forEach((b, i) => b.classList.toggle('active', i == index));
            document.getElementById('month-dropdown-select').value = index;

            // Scroll to today if in view
            const todayRow = document.querySelector('.row-highlight');
            if (todayRow) todayRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        window.addEventListener('DOMContentLoaded', loadData);
    </script>

    <script src="script.js"></script>
</body>
</html>

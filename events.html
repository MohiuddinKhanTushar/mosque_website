<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events & News | Yardley Muslim Centre</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <style>
        .page-hero {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 500px;
            z-index: -1;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0) 0%, #f9f9f9 100%), 
                        url('assets/events.png');
            background-size: cover;
            background-position: center;
        }

        .events-main-content {
            padding-top: 140px;
            max-width: 1200px;
            margin: 0 auto;
            padding-left: 20px;
            padding-right: 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .page-header h1 {
            font-size: 3rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .section-divider {
            display: flex;
            justify-content: center;
            margin: 60px 0 40px;
        }

        .section-divider h2 {
            font-size: 1.8rem;
            color: #1a1a1a;
            font-weight: 700;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
            min-height: 100px;
        }

        .event-card {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.04);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .event-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.08);
        }

        .event-image {
            width: 100%;
            height: 240px;
            position: relative;
            overflow: hidden;
        }

        .event-image img { width: 100%; height: 100%; object-fit: cover; }

        .event-date-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.85rem;
            color: #d4af37;
            z-index: 2;
        }

        .event-content { padding: 30px; flex-grow: 1; display: flex; flex-direction: column; }
        .event-content h3 { font-size: 1.4rem; margin-bottom: 12px; color: #1a1a1a; }
        .event-content p { color: #666; line-height: 1.6; font-size: 0.95rem; margin-bottom: 20px; flex-grow: 1; }

        .event-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }

        .event-time {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #666;
            font-size: 0.9rem;
        }

        .btn-event-details { color: #d4af37; text-decoration: none; font-weight: 700; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; cursor: pointer; border: none; background: none; }

        .news-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 80px;
        }

        .news-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            gap: 25px;
            border: 1px solid rgba(0,0,0,0.03);
            transition: 0.3s;
            align-items: center;
        }

        .news-card:hover { border-color: #d4af37; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }

        .news-img {
            width: 180px;
            height: 120px;
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .news-info h3 { margin: 0 0 8px 0; font-size: 1.2rem; }
        .news-info p { color: #666; font-size: 0.9rem; line-height: 1.5; margin-bottom: 10px; }
        .news-meta { font-size: 0.75rem; color: #aaa; font-weight: 600; text-transform: uppercase; }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
            padding: 20px;
        }

        .modal-container {
            background: white;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            border-radius: 24px;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-close {
            position: sticky;
            top: 20px;
            left: 92%;
            background: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-body { padding: 40px; }
        .modal-body h2 { font-size: 2rem; margin-bottom: 10px; color: #1a1a1a; }
        .modal-date { color: #d4af37; font-weight: 700; margin-bottom: 20px; display: block; }
        .modal-desc { line-height: 1.8; color: #444; font-size: 1.1rem; margin-bottom: 30px; white-space: pre-wrap; }
        
        .modal-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .modal-gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid #eee;
        }

        @media (max-width: 768px) {
            .page-header h1 { font-size: 2.2rem; }
            .events-grid { grid-template-columns: 1fr; }
            .news-card { flex-direction: column; align-items: flex-start; }
            .news-img { width: 100%; height: 200px; }
            .modal-body { padding: 25px; }
        }

        .reveal { opacity: 0; transform: translateY(30px); transition: 0.6s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div class="page-hero"></div>

    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html"><img src="assets/logo.png" alt="YMC Logo" class="logo-img"></a>
            <button class="menu-toggle" id="menu-toggle" aria-label="Toggle Menu">
                <i data-lucide="menu"></i>
            </button>
            <ul class="nav-menu" id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="timetable.html">Timetable</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="events.html" style="color: #d4af37;">Events</a></li>
                <li><a href="charity.html">Sadaqah</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="donate.html" class="btn-donate">Du'a</a></li>
            </ul>
        </div>
    </nav>

    <main class="events-main-content">
        <header class="page-header reveal active">
            <h1>Events & News</h1>
            <p>Stay updated with the latest activities and community news at Yardley Muslim Centre.</p>
        </header>

        <div class="section-divider reveal active">
            <h2>Upcoming Events</h2>
        </div>
        
        <div class="events-grid" id="events-container">
            <p style="text-align: center; grid-column: 1/-1; color: #888;">Loading events...</p>
        </div>

        <div class="section-divider reveal active">
            <h2>Latest News</h2>
        </div>

        <div class="news-stack" id="news-container">
            <p style="text-align: center; color: #888;">Loading news...</p>
        </div>
    </main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-container">
            <button class="modal-close" onclick="closeModal()">
                <i data-lucide="x"></i>
            </button>
            <div class="modal-body" id="modalContent"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCuMwrIJ2ZRXLUIkzAsu_LMPzGFGzR4Fuw",
            authDomain: "yardley-muslim-centre.firebaseapp.com",
            projectId: "yardley-muslim-centre",
            storageBucket: "yardley-muslim-centre.firebasestorage.app",
            messagingSenderId: "719443343087",
            appId: "1:719443343087:web:5bdf57271c1b4fcad10d1a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let cloudData = { upcoming: {}, news: {} };

        async function loadCloudContent() {
            const eventContainer = document.getElementById('events-container');
            const newsContainer = document.getElementById('news-container');

            // 1. Load Events
            try {
                let eventSnap;
                try {
                    eventSnap = await getDocs(query(collection(db, "upcoming"), orderBy("createdAt", "desc")));
                } catch (err) {
                    console.warn("Ordered fetch failed, trying unordered:", err);
                    eventSnap = await getDocs(collection(db, "upcoming"));
                }

                if (!eventSnap.empty) {
                    eventContainer.innerHTML = eventSnap.docs.map(doc => {
                        const event = doc.data();
                        cloudData.upcoming[doc.id] = event;
                        const imgUrl = (event.images && event.images.length > 0) ? event.images[0] : 'assets/event-placeholder.jpg';
                        const description = event.desc || '';
                        
                        // LOGIC FIX: Handle Display Date and Time for Recurring vs Normal
                        let dateDisplay = "TBC";
                        let timeDisplay = "TBC";

                        if (event.isRecurring || event.recurring === "true" || event.recurring === true) {
                            dateDisplay = event.recurrenceDay || "Weekly";
                            timeDisplay = event.recurrenceTime || event.time || "TBC";
                        } else {
                            dateDisplay = event.date || "TBC";
                            timeDisplay = event.time || "TBC";
                        }

                        return `
                        <article class="event-card reveal active">
                            <div class="event-image">
                                <div class="event-date-badge">${dateDisplay}</div>
                                <img src="${imgUrl}" alt="${event.title}">
                            </div>
                            <div class="event-content">
                                <h3>${event.title || 'Untitled Event'}</h3>
                                <p>${description.substring(0, 120)}${description.length > 120 ? '...' : ''}</p>
                                <div class="event-footer">
                                    <div class="event-time">
                                        <i data-lucide="clock" style="width:16px;"></i> <span>${timeDisplay}</span>
                                    </div>
                                    <button onclick="openModal('upcoming', '${doc.id}')" class="btn-event-details">View Details <i data-lucide="chevron-right" style="width:16px;"></i></button>
                                </div>
                            </div>
                        </article>`;
                    }).join('');
                } else {
                    eventContainer.innerHTML = '<p style="text-align: center; grid-column: 1/-1; color: #888;">No upcoming events at the moment.</p>';
                }
            } catch (e) { 
                console.error("Error loading events:", e);
                eventContainer.innerHTML = '<p style="text-align: center; grid-column: 1/-1; color: red;">Failed to load events.</p>';
            }

            // 2. Load News
            try {
                let newsSnap;
                try {
                    newsSnap = await getDocs(query(collection(db, "news"), orderBy("createdAt", "desc")));
                } catch (err) {
                    console.warn("Ordered news fetch failed, trying unordered:", err);
                    newsSnap = await getDocs(collection(db, "news"));
                }

                if (!newsSnap.empty) {
                    newsContainer.innerHTML = newsSnap.docs.map(doc => {
                        const item = doc.data();
                        cloudData.news[doc.id] = item;
                        const imgUrl = (item.images && item.images.length > 0) ? item.images[0] : 'assets/event-placeholder.jpg';
                        return `
                        <article class="news-card reveal active">
                            <img src="${imgUrl}" alt="News" class="news-img">
                            <div class="news-info">
                                <div class="news-meta">${item.date || 'Recent Update'}</div>
                                <h3>${item.title || 'Untitled News'}</h3>
                                <p>${(item.desc || item.excerpt || '').substring(0, 150)}...</p>
                                <button onclick="openModal('news', '${doc.id}')" class="btn-event-details">Read More <i data-lucide="arrow-right" style="width:16px;"></i></button>
                            </div>
                        </article>`;
                    }).join('');
                } else {
                    newsContainer.innerHTML = '<p style="text-align: center; color: #888;">No news items available.</p>';
                }
            } catch (e) { 
                console.error("Error loading news:", e);
                newsContainer.innerHTML = '<p style="text-align: center; color: red;">Failed to load news.</p>';
            }

            if (window.lucide) lucide.createIcons();
        }

        window.openModal = (type, id) => {
            const data = cloudData[type][id];
            if (!data) return;
            const modalOverlay = document.getElementById('modalOverlay');
            const modalContent = document.getElementById('modalContent');

            let imagesHtml = '';
            if (data.images && data.images.length > 0) {
                imagesHtml = `<div class="modal-gallery">
                    ${data.images.map(img => `<img src="${img}" alt="gallery">`).join('')}
                </div>`;
            }

            // LOGIC FIX: Modal date/time string construction
            let modalDateDisplay = "";
            let modalTimeDisplay = "";

            if (type === 'upcoming') {
                if (data.isRecurring || data.recurring === "true" || data.recurring === true) {
                    modalDateDisplay = data.recurrenceDay || "Recurring Event";
                    modalTimeDisplay = data.recurrenceTime || data.time || "TBC";
                } else {
                    modalDateDisplay = data.date || "Date TBC";
                    modalTimeDisplay = data.time || "TBC";
                }
            } else {
                modalDateDisplay = data.date || "Recent News";
            }

            modalContent.innerHTML = `
                <span class="modal-date">${modalDateDisplay}${modalTimeDisplay ? ' | ' + modalTimeDisplay : ''}</span>
                <h2>${data.title || 'Update'}</h2>
                <div class="modal-desc">${data.desc || data.content || 'No description available.'}</div>
                ${imagesHtml}
            `;

            modalOverlay.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            if (window.lucide) lucide.createIcons();
        };

        window.closeModal = () => {
            document.getElementById('modalOverlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        };

        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target.id === 'modalOverlay') closeModal();
        });

        window.addEventListener('DOMContentLoaded', loadCloudContent);
    </script>
    
    <footer class="footer">
        <p>© 2026 Yardley Muslim Centre. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
